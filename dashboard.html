<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LUXE Admin Dashboard</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      :root {
        --black: #0f0f0f;
        --white: #ffffff;
        --cream: #f8f5f0;
        --gold: #c9a84c;
        --gold-light: #e8c97a;
        --gold-dim: rgba(201, 168, 76, 0.12);
        --gray-100: #f5f5f5;
        --gray-200: #e5e5e5;
        --gray-400: #9ca3af;
        --gray-600: #4b5563;
        --success: #16a34a;
        --danger: #dc2626;
        --font-display: "Cormorant Garamond", serif;
        --font-body: "DM Sans", sans-serif;
        --radius: 10px;
        --radius-sm: 6px;
        --shadow: 0 2px 16px rgba(0, 0, 0, 0.06);
        --shadow-md: 0 4px 28px rgba(0, 0, 0, 0.1);
      }
      body {
        font-family: var(--font-body);
        background: var(--cream);
        color: var(--black);
        overflow-x: hidden;
        font-size: 14px;
      }
      .admin-layout {
        display: flex;
        min-height: 100vh;
      }
      .admin-sidebar {
        width: 240px;
        min-height: 100vh;
        background: var(--black);
        position: fixed;
        top: 0;
        left: 0;
        bottom: 0;
        z-index: 50;
        display: flex;
        flex-direction: column;
        padding: 0;
        overflow-y: auto;
      }
      .admin-logo {
        font-family: var(--font-display);
        font-size: 1.6rem;
        font-weight: 700;
        color: var(--white);
        padding: 28px 24px 20px;
        letter-spacing: 2px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.06);
      }
      .admin-logo span {
        color: var(--gold);
      }
      .admin-nav {
        padding: 12px 12px;
        flex: 1;
      }
      .admin-nav-item {
        width: 100%;
        display: flex;
        align-items: center;
        gap: 10px;
        background: none;
        border: none;
        color: rgba(255, 255, 255, 0.55);
        font-family: var(--font-body);
        font-size: 0.82rem;
        font-weight: 500;
        padding: 10px 12px;
        border-radius: var(--radius-sm);
        cursor: pointer;
        text-align: left;
        transition: all 0.18s;
        letter-spacing: 0.3px;
      }
      .admin-nav-item:hover {
        background: rgba(255, 255, 255, 0.06);
        color: rgba(255, 255, 255, 0.85);
      }
      .admin-nav-item.active {
        background: var(--gold-dim);
        color: var(--gold);
      }
      .admin-nav-icon {
        font-size: 1rem;
        width: 20px;
        text-align: center;
      }
      .nav-logout {
        padding: 12px 12px;
        border-top: 1px solid rgba(255, 255, 255, 0.06);
      }
      .admin-main {
        margin-left: 240px;
        flex: 1;
        display: flex;
        flex-direction: column;
        min-height: 100vh;
      }
      .admin-topbar {
        background: var(--white);
        border-bottom: 1px solid var(--gray-200);
        padding: 0 32px;
        height: 64px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        position: sticky;
        top: 0;
        z-index: 40;
        box-shadow: 0 1px 8px rgba(0, 0, 0, 0.04);
      }
      .admin-page-title {
        font-family: var(--font-display);
        font-size: 1.4rem;
        font-weight: 600;
      }
      .admin-topbar-user {
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .admin-avatar {
        width: 36px;
        height: 36px;
        border-radius: 50%;
        background: var(--gold);
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 700;
        font-size: 0.85rem;
        color: var(--black);
      }
      .admin-content {
        padding: 28px 32px;
        flex: 1;
      }
      .form-group {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }
      .form-group label {
        font-size: 0.72rem;
        font-weight: 600;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--gray-600);
      }
      .form-group input,
      .form-group select,
      .form-group textarea {
        padding: 10px 14px;
        border: 1.5px solid var(--gray-200);
        font-family: var(--font-body);
        font-size: 0.88rem;
        outline: none;
        border-radius: var(--radius-sm);
        transition:
          border-color 0.18s,
          box-shadow 0.18s;
        background: var(--white);
        color: var(--black);
      }
      .form-group input:focus,
      .form-group select:focus,
      .form-group textarea:focus {
        border-color: var(--gold);
        box-shadow: 0 0 0 3px rgba(201, 168, 76, 0.1);
      }
      .form-group input[readonly] {
        background: var(--gray-100);
        color: var(--gray-600);
        font-family: monospace;
      }
      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
        font-family: var(--font-body);
        font-size: 0.82rem;
        font-weight: 600;
        padding: 9px 18px;
        border-radius: var(--radius-sm);
        cursor: pointer;
        border: none;
        transition: all 0.18s;
        letter-spacing: 0.5px;
        text-decoration: none;
      }
      .btn-primary {
        background: var(--black);
        color: var(--white);
      }
      .btn-primary:hover {
        background: #1f1f1f;
      }
      .btn-gold {
        background: var(--gold);
        color: var(--black);
      }
      .btn-gold:hover {
        background: var(--gold-light);
      }
      .btn-outline {
        background: none;
        border: 1.5px solid var(--gray-200);
        color: var(--black);
      }
      .btn-outline:hover {
        border-color: var(--black);
        background: var(--black);
        color: var(--white);
      }
      .btn-full {
        width: 100%;
      }
      .btn-sm {
        padding: 6px 12px;
        font-size: 0.78rem;
      }
      .btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
      .stats-grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 16px;
        margin-bottom: 24px;
      }
      .stat-card {
        background: var(--white);
        border-radius: var(--radius);
        padding: 20px 24px;
        box-shadow: var(--shadow);
        border: 1px solid transparent;
        transition:
          border-color 0.2s,
          box-shadow 0.2s;
      }
      .stat-card:hover {
        border-color: var(--gold);
        box-shadow: var(--shadow-md);
      }
      .stat-icon {
        font-size: 1.5rem;
        margin-bottom: 8px;
      }
      .stat-val {
        font-family: var(--font-display);
        font-size: 1.8rem;
        font-weight: 700;
        line-height: 1;
        margin-bottom: 4px;
      }
      .stat-label {
        font-size: 0.75rem;
        color: var(--gray-400);
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }
      .admin-table-card {
        background: var(--white);
        border-radius: var(--radius);
        box-shadow: var(--shadow);
        overflow: hidden;
      }
      .admin-table-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 18px 24px;
        border-bottom: 1px solid var(--gray-200);
      }
      .admin-table-head h3 {
        font-family: var(--font-display);
        font-size: 1.05rem;
        font-weight: 600;
      }
      .data-table {
        width: 100%;
        border-collapse: collapse;
        font-size: 0.84rem;
      }
      .data-table th {
        padding: 11px 16px;
        border-bottom: 2px solid var(--gray-200);
        text-align: left;
        font-size: 0.7rem;
        font-weight: 700;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: var(--gray-400);
        background: var(--gray-100);
      }
      .data-table td {
        padding: 12px 16px;
        border-bottom: 1px solid var(--gray-100);
        vertical-align: middle;
      }
      .data-table tr:last-child td {
        border-bottom: none;
      }
      .data-table tr:hover td {
        background: rgba(201, 168, 76, 0.03);
      }
      .status-badge {
        display: inline-block;
        padding: 3px 9px;
        border-radius: 20px;
        font-size: 0.7rem;
        font-weight: 600;
        letter-spacing: 0.05em;
        text-transform: uppercase;
      }
      .status-pending {
        background: #fef9c3;
        color: #854d0e;
      }
      .status-confirmed {
        background: #dbeafe;
        color: #1e40af;
      }
      .status-shipped {
        background: #e0e7ff;
        color: #3730a3;
      }
      .status-delivered {
        background: #dcfce7;
        color: #15803d;
      }
      .status-cancelled {
        background: #fee2e2;
        color: #991b1b;
      }
      #login-screen {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: var(--black);
        position: relative;
        overflow: hidden;
      }
      #login-screen::before {
        content: "LUXE";
        position: absolute;
        font-family: var(--font-display);
        font-size: 22rem;
        font-weight: 700;
        color: rgba(201, 168, 76, 0.04);
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        pointer-events: none;
        white-space: nowrap;
      }
      .login-card {
        background: var(--white);
        width: 100%;
        max-width: 420px;
        padding: 48px 44px;
        border-radius: var(--radius);
        position: relative;
        z-index: 2;
        animation: slideUp 0.4s ease;
      }
      @keyframes slideUp {
        from {
          transform: translateY(20px);
          opacity: 0;
        }
        to {
          transform: translateY(0);
          opacity: 1;
        }
      }
      .login-logo {
        font-family: var(--font-display);
        font-size: 2rem;
        font-weight: 700;
        margin-bottom: 4px;
      }
      .login-logo span {
        color: var(--gold);
      }
      .login-subtitle {
        font-size: 0.8rem;
        letter-spacing: 0.15em;
        text-transform: uppercase;
        color: var(--gray-400);
        margin-bottom: 36px;
      }
      .login-error {
        background: #fef2f2;
        border: 1px solid #fecaca;
        color: #991b1b;
        padding: 10px 14px;
        font-size: 0.82rem;
        margin-bottom: 16px;
        display: none;
        border-radius: var(--radius-sm);
      }
      #dashboard-screen {
        display: none;
      }
      .modal-overlay {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.55);
        z-index: 200;
        display: flex;
        align-items: center;
        justify-content: center;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.2s;
        padding: 16px;
      }
      .modal-overlay.show {
        opacity: 1;
        pointer-events: all;
      }
      .modal {
        background: var(--white);
        width: 100%;
        max-width: 760px;
        border-radius: var(--radius);
        box-shadow: var(--shadow-md);
        transform: translateY(12px);
        transition: transform 0.2s;
        max-height: 92vh;
        overflow: hidden;
        display: flex;
        flex-direction: column;
      }
      .modal-overlay.show .modal {
        transform: translateY(0);
      }
      .modal-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 20px 24px;
        border-bottom: 1px solid var(--gray-200);
      }
      .modal-header h3 {
        font-family: var(--font-display);
        font-size: 1.2rem;
        font-weight: 600;
      }
      .modal-body {
        padding: 24px;
        overflow-y: auto;
        flex: 1;
      }
      .modal-footer {
        padding: 16px 24px;
        border-top: 1px solid var(--gray-200);
        display: flex;
        gap: 10px;
        justify-content: flex-end;
      }
      .toast-container {
        position: fixed;
        bottom: 24px;
        right: 24px;
        z-index: 999;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .toast {
        background: var(--black);
        color: var(--white);
        padding: 12px 20px;
        border-radius: var(--radius-sm);
        font-size: 0.83rem;
        box-shadow: var(--shadow-md);
        display: flex;
        align-items: center;
        gap: 10px;
        border-left: 3px solid var(--gold);
        opacity: 0;
        transform: translateX(20px);
        transition: all 0.3s;
        max-width: 320px;
      }
      .toast.show {
        opacity: 1;
        transform: translateX(0);
      }
      .toast.success {
        border-left-color: var(--success);
      }
      .toast.error {
        border-left-color: var(--danger);
      }
      .spinner {
        display: inline-block;
        width: 18px;
        height: 18px;
        border: 2px solid rgba(255, 255, 255, 0.25);
        border-top-color: currentColor;
        border-radius: 50%;
        animation: spin 0.6s linear infinite;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
      .loading-overlay {
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 60px;
      }
      .product-block {
        background: var(--cream);
        padding: 20px;
        margin-bottom: 16px;
        border-left: 3px solid var(--gold);
        border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
      }
      .product-block h4 {
        font-family: var(--font-display);
        font-size: 0.95rem;
        margin-bottom: 14px;
        color: var(--black);
      }
      .desc-field {
        display: flex;
        flex-direction: column;
        gap: 6px;
        margin-bottom: 12px;
      }
      .desc-field label {
        font-size: 0.72rem;
        font-weight: 700;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: var(--gray-600);
      }
      .desc-field input,
      .desc-field textarea,
      .desc-field select {
        padding: 10px 14px;
        border: 1.5px solid var(--gray-200);
        font-family: var(--font-body);
        font-size: 0.88rem;
        outline: none;
        border-radius: var(--radius-sm);
        transition: border-color 0.18s;
        background: var(--white);
      }
      .desc-field input:focus,
      .desc-field textarea:focus {
        border-color: var(--gold);
      }
      .img-upload-area {
        border: 2px dashed var(--gray-200);
        padding: 24px;
        text-align: center;
        cursor: pointer;
        transition:
          border-color 0.2s,
          background 0.2s;
        background: var(--gray-100);
        border-radius: var(--radius-sm);
      }
      .img-upload-area:hover {
        border-color: var(--gold);
        background: rgba(201, 168, 76, 0.04);
      }
      .img-preview {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        margin-top: 10px;
      }
      .img-preview-item {
        position: relative;
        width: 80px;
        height: 90px;
        border-radius: 4px;
        overflow: visible;
      }
      .img-preview-item img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        border-radius: 4px;
        border: 1px solid var(--gray-200);
      }
      .img-preview-item button {
        position: absolute;
        top: -6px;
        right: -6px;
        background: var(--danger);
        color: white;
        border: none;
        border-radius: 50%;
        width: 20px;
        height: 20px;
        cursor: pointer;
        font-size: 0.65rem;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .size-guide-row {
        display: grid;
        grid-template-columns: 1fr 1fr 1fr auto;
        gap: 8px;
        align-items: center;
        margin-bottom: 8px;
      }
      .size-guide-header {
        display: grid;
        grid-template-columns: 1fr 1fr 1fr auto;
        gap: 8px;
        margin-bottom: 6px;
      }
      .size-guide-header span {
        font-size: 0.7rem;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--gray-600);
      }
      .shipping-table {
        width: 100%;
        border-collapse: collapse;
        font-size: 0.85rem;
      }
      .shipping-table td,
      .shipping-table th {
        padding: 10px 14px;
        border: 1px solid var(--gray-200);
      }
      .shipping-table th {
        background: var(--gray-100);
        font-size: 0.72rem;
        letter-spacing: 0.1em;
        text-transform: uppercase;
      }

      /* CATALOG */
      .catalog-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
        gap: 18px;
      }
      .catalog-card {
        background: var(--white);
        border-radius: var(--radius);
        overflow: hidden;
        box-shadow: var(--shadow);
        transition:
          transform 0.2s,
          box-shadow 0.2s;
        animation: fadeUp 0.35s ease both;
      }
      .catalog-card:hover {
        transform: translateY(-3px);
        box-shadow: var(--shadow-md);
      }
      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(14px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      /* MULTI-IMAGE GALLERY ON CARD */
      .catalog-gallery {
        position: relative;
        width: 100%;
        height: 200px;
        overflow: hidden;
        background: var(--gray-100);
      }
      .catalog-gallery-track {
        display: flex;
        height: 100%;
        transition: transform 0.32s cubic-bezier(0.4, 0, 0.2, 1);
      }
      .catalog-gallery-slide {
        min-width: 100%;
        height: 100%;
        flex-shrink: 0;
      }
      .catalog-gallery-slide img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }
      .catalog-gallery-placeholder {
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 2.5rem;
        color: var(--gray-400);
      }
      .gallery-nav {
        position: absolute;
        top: 50%;
        transform: translateY(-50%);
        background: rgba(0, 0, 0, 0.45);
        color: #fff;
        border: none;
        width: 28px;
        height: 28px;
        border-radius: 50%;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 0.75rem;
        transition: background 0.18s;
        z-index: 2;
      }
      .gallery-nav:hover {
        background: rgba(0, 0, 0, 0.75);
      }
      .gallery-prev {
        left: 6px;
      }
      .gallery-next {
        right: 6px;
      }
      .gallery-dots {
        position: absolute;
        bottom: 6px;
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        gap: 4px;
        z-index: 2;
      }
      .gallery-dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.5);
        border: none;
        cursor: pointer;
        padding: 0;
        transition: background 0.18s;
      }
      .gallery-dot.active {
        background: #fff;
      }
      .gallery-count {
        position: absolute;
        top: 7px;
        right: 8px;
        background: rgba(0, 0, 0, 0.55);
        color: #fff;
        font-size: 0.68rem;
        font-weight: 600;
        padding: 2px 7px;
        border-radius: 10px;
        z-index: 2;
      }

      .catalog-info {
        padding: 12px;
      }
      .catalog-cat {
        font-size: 0.68rem;
        font-weight: 700;
        letter-spacing: 1.4px;
        text-transform: uppercase;
        color: var(--gold);
        margin-bottom: 3px;
      }
      .catalog-name {
        font-family: var(--font-display);
        font-size: 0.98rem;
        font-weight: 600;
        margin-bottom: 3px;
        color: var(--black);
        line-height: 1.3;
      }
      .catalog-id {
        font-family: monospace;
        font-size: 0.72rem;
        color: var(--gray-400);
        margin-bottom: 4px;
      }
      .catalog-price-tag {
        font-size: 0.82rem;
        font-weight: 700;
        color: var(--black);
        margin-bottom: 6px;
        font-family: var(--font-display);
      }
      .catalog-sizes {
        display: flex;
        flex-wrap: wrap;
        gap: 4px;
        margin-bottom: 10px;
      }
      .size-badge {
        background: var(--cream);
        border: 1px solid var(--gray-200);
        font-size: 0.68rem;
        font-weight: 600;
        padding: 2px 7px;
        border-radius: 4px;
        color: var(--gray-600);
      }
      .sizes-grid {
        display: flex;
        flex-wrap: wrap;
        gap: 7px;
      }
      .size-chip {
        border: 1.5px solid var(--gray-200);
        border-radius: 20px;
        padding: 5px 12px;
        cursor: pointer;
        user-select: none;
        font-size: 0.8rem;
        font-weight: 500;
        transition: all 0.18s;
        background: var(--white);
      }
      .size-chip.checked {
        background: var(--black);
        border-color: var(--black);
        color: var(--white);
      }
      .size-chip:hover:not(.checked) {
        border-color: var(--gold);
        color: var(--gold);
      }

      /* MULTI-IMAGE UPLOAD ZONE */
      .multi-upload-zone {
        border: 2px dashed var(--gray-200);
        border-radius: var(--radius-sm);
        padding: 20px;
        text-align: center;
        cursor: pointer;
        transition: all 0.2s;
        background: var(--gray-100);
        position: relative;
        overflow: hidden;
        margin-bottom: 10px;
      }
      .multi-upload-zone input[type="file"] {
        position: absolute;
        inset: 0;
        opacity: 0;
        cursor: pointer;
        z-index: 2;
      }
      .multi-upload-zone:hover {
        border-color: var(--gold);
        background: rgba(201, 168, 76, 0.04);
      }
      .multi-upload-zone.maxed {
        opacity: 0.5;
        pointer-events: none;
      }
      .multi-img-strip {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        margin-top: 8px;
      }
      .multi-img-thumb {
        position: relative;
        width: 72px;
        height: 82px;
        border-radius: 5px;
        overflow: visible;
        flex-shrink: 0;
      }
      .multi-img-thumb img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        border-radius: 5px;
        border: 1.5px solid var(--gray-200);
        display: block;
      }
      .multi-img-thumb.is-main img {
        border-color: var(--gold);
        border-width: 2px;
      }
      .multi-img-thumb .thumb-del {
        position: absolute;
        top: -6px;
        right: -6px;
        background: var(--danger);
        color: white;
        border: none;
        border-radius: 50%;
        width: 18px;
        height: 18px;
        cursor: pointer;
        font-size: 0.58rem;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 3;
      }
      .thumb-main-label {
        position: absolute;
        bottom: -7px;
        left: 50%;
        transform: translateX(-50%);
        background: var(--gold);
        color: var(--black);
        font-size: 0.58rem;
        font-weight: 700;
        padding: 1px 5px;
        border-radius: 3px;
        white-space: nowrap;
        pointer-events: none;
      }
      .thumb-set-main {
        position: absolute;
        bottom: -7px;
        left: 50%;
        transform: translateX(-50%);
        background: var(--black);
        color: white;
        border: none;
        border-radius: 3px;
        font-size: 0.58rem;
        font-weight: 600;
        padding: 2px 5px;
        cursor: pointer;
        white-space: nowrap;
        z-index: 3;
        transition: background 0.15s;
      }
      .thumb-set-main:hover {
        background: var(--gold);
        color: var(--black);
      }
      .upload-count-note {
        font-size: 0.74rem;
        color: var(--gray-400);
        margin-top: 6px;
        text-align: center;
      }

      /* Catalog card actions */
      .catalog-action-row {
        display: flex;
        gap: 5px;
      }
      .cat-action-btn {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 4px;
        border-radius: var(--radius-sm);
        padding: 7px 0;
        font-family: var(--font-body);
        font-size: 0.74rem;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.18s;
        border: 1.5px solid var(--gray-200);
      }
      .cat-action-edit {
        background: var(--cream);
        color: var(--black);
      }
      .cat-action-edit:hover {
        background: var(--black);
        color: var(--white);
        border-color: var(--black);
      }
      .cat-action-copy {
        background: var(--cream);
        color: var(--black);
      }
      .cat-action-copy:hover {
        background: var(--black);
        color: var(--white);
        border-color: var(--black);
      }
      .cat-action-copy.copied {
        background: var(--success);
        color: white;
        border-color: var(--success);
      }
      .cat-action-del {
        background: none;
        color: var(--danger);
        border-color: var(--gray-200);
      }
      .cat-action-del:hover {
        background: var(--danger);
        color: white;
        border-color: var(--danger);
      }

      @media (max-width: 900px) {
        .admin-sidebar {
          width: 64px;
        }
        .admin-nav-item span:last-child,
        .admin-logo span {
          display: none;
        }
        .admin-main {
          margin-left: 64px;
        }
        .admin-content {
          padding: 20px 16px;
        }
        .stats-grid {
          grid-template-columns: 1fr 1fr;
        }
      }
      @media (max-width: 600px) {
        .admin-sidebar {
          display: none;
        }
        .admin-main {
          margin-left: 0;
        }
        .login-card {
          margin: 16px;
          padding: 32px 24px;
        }
      }
      .product-badge {
        display: inline-block;
        padding: 2px 8px;
        border-radius: 3px;
        font-size: 0.7rem;
        font-weight: 700;
        letter-spacing: 0.05em;
        text-transform: uppercase;
      }
      .badge-new {
        background: #d1fae5;
        color: #065f46;
      }
      .badge-sale {
        background: #fee2e2;
        color: #991b1b;
      }
      .badge-hot {
        background: #fef3c7;
        color: #92400e;
      }
      .badge-limited {
        background: #ede9fe;
        color: #5b21b6;
      }
    </style>
  </head>
  <body>
    <!-- LOGIN -->
    <div id="login-screen">
      <div class="login-card">
        <div class="login-logo">LUX<span>E</span></div>
        <div class="login-subtitle">Admin Dashboard</div>
        <div class="login-error" id="login-error">
          Invalid email or password.
        </div>
        <div style="display: flex; flex-direction: column; gap: 14px">
          <div class="form-group">
            <label>Email Address</label
            ><input
              type="email"
              id="login-email"
              placeholder="admin@example.com"
              onkeydown="if (event.key === 'Enter') doLogin();"
            />
          </div>
          <div class="form-group">
            <label>Password</label
            ><input
              type="password"
              id="login-pw"
              placeholder="........"
              onkeydown="if (event.key === 'Enter') doLogin();"
            />
          </div>
          <button
            class="btn btn-primary btn-full"
            style="padding: 15px; margin-top: 6px"
            onclick="doLogin()"
            id="login-btn"
          >
            Sign In to Dashboard
          </button>
          <div style="text-align: center">
            <a
              href="index.html"
              style="
                font-size: 0.8rem;
                color: var(--gray-400);
                text-decoration: none;
              "
              >Back to Store</a
            >
          </div>
        </div>
      </div>
    </div>

    <!-- DASHBOARD -->
    <div id="dashboard-screen">
      <div class="admin-layout">
        <aside class="admin-sidebar">
          <div class="admin-logo">
            LUX<span>E</span
            ><span
              style="
                font-size: 0.6rem;
                color: rgba(255, 255, 255, 0.35);
                font-family: var(--font-body);
                display: block;
                margin-top: 1px;
                letter-spacing: 3px;
              "
              >ADMIN</span
            >
          </div>
          <nav class="admin-nav">
            <button
              class="admin-nav-item active"
              onclick="adminNav('dashboard', this)"
            >
              <span class="admin-nav-icon">&#128202;</span> Dashboard
            </button>
            <button class="admin-nav-item" onclick="adminNav('orders', this)">
              <span class="admin-nav-icon">&#128230;</span> Orders
            </button>
            <button class="admin-nav-item" onclick="adminNav('products', this)">
              <span class="admin-nav-icon">&#128247;</span> Products
            </button>
            <button class="admin-nav-item" onclick="adminNav('catalog', this)">
              <span class="admin-nav-icon">&#128247;</span> Catalog Upload
            </button>
            <button class="admin-nav-item" onclick="adminNav('coupons', this)">
              <span class="admin-nav-icon">&#127915;</span> Coupons
            </button>
            <button
              class="admin-nav-item"
              onclick="adminNav('customers', this)"
            >
              <span class="admin-nav-icon">&#128101;</span> Customers
            </button>
            <button
              class="admin-nav-item"
              onclick="adminNav('categories', this)"
            >
              <span class="admin-nav-icon">&#128193;</span> Categories
            </button>
            <button class="admin-nav-item" onclick="adminNav('shipping', this)">
              <span class="admin-nav-icon">&#128666;</span> Shipping
            </button>
          </nav>
          <div class="nav-logout">
            <button
              class="admin-nav-item"
              onclick="doLogout()"
              style="width: 100%"
            >
              <span class="admin-nav-icon">&#128682;</span> Logout
            </button>
          </div>
        </aside>
        <div class="admin-main">
          <div class="admin-topbar">
            <h2 class="admin-page-title" id="admin-page-title">Dashboard</h2>
            <div class="admin-topbar-user">
              <div
                style="font-size: 0.82rem; color: var(--gray-600)"
                id="admin-username"
              >
                Admin
              </div>
              <div class="admin-avatar" id="admin-avatar-letter">A</div>
            </div>
          </div>
          <div class="admin-content" id="admin-content-area">
            <div class="loading-overlay">
              <div
                class="spinner"
                style="
                  border-color: var(--gray-200);
                  border-top-color: var(--gold);
                  width: 28px;
                  height: 28px;
                "
              ></div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="toast-container"></div>
    <div
      class="modal-overlay"
      id="modal-overlay"
      onclick="if (event.target === this) closeModal();"
    >
      <div class="modal" id="modal-content"></div>
    </div>

    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
      import {
        getAuth,
        signInWithEmailAndPassword,
        signOut,
        onAuthStateChanged,
      } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
      import {
        getFirestore,
        collection,
        addDoc,
        getDocs,
        doc,
        updateDoc,
        deleteDoc,
        query,
        orderBy,
      } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
      import {
        getStorage,
        ref as sRef,
        uploadBytes,
        getDownloadURL,
      } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js";

      const FIREBASE_CONFIG = {
        apiKey: "AIzaSyD2xtZZ9viQOxjmnYpzQhtjYne5l82FM3Y",
        authDomain: "bluedreamitaly.firebaseapp.com",
        projectId: "bluedreamitaly",
        storageBucket: "bluedreamitaly.firebasestorage.app",
        messagingSenderId: "145879085917",
        appId: "1:145879085917:web:938008da8d22839f7c6eb4",
      };

      const app = initializeApp(FIREBASE_CONFIG);
      const auth = getAuth(app);
      const db = getFirestore(app);
      const storage = getStorage(app);

      window.ADMIN = {
        user: null,
        products: [],
        orders: [],
        coupons: [],
        categories: [],
        shipping: null,
        shippingDocId: null,
        catalogProducts: [],
      };

      // ── AUTH ──
      window.doLogin = async function () {
        const email = document.getElementById("login-email").value.trim(),
          pw = document.getElementById("login-pw").value;
        const errEl = document.getElementById("login-error"),
          btn = document.getElementById("login-btn");
        errEl.style.display = "none";
        btn.innerHTML = '<span class="spinner"></span>';
        btn.disabled = true;
        try {
          await enterDashboard(
            (await signInWithEmailAndPassword(auth, email, pw)).user,
          );
        } catch (e) {
          errEl.style.display = "block";
          errEl.textContent =
            e.code === "auth/invalid-credential" ||
            e.code === "auth/wrong-password" ||
            e.code === "auth/user-not-found"
              ? "Invalid email or password."
              : e.message;
        } finally {
          btn.innerHTML = "Sign In to Dashboard";
          btn.disabled = false;
        }
      };
      window.doLogout = async function () {
        await signOut(auth);
        document.getElementById("login-screen").style.display = "flex";
        document.getElementById("dashboard-screen").style.display = "none";
        document.getElementById("login-email").value = "";
        document.getElementById("login-pw").value = "";
        ADMIN.user = null;
      };
      onAuthStateChanged(auth, async (u) => {
        if (u) await enterDashboard(u);
      });
      async function enterDashboard(user) {
        ADMIN.user = user;
        const name = user.displayName || user.email?.split("@")[0] || "Admin";
        document.getElementById("login-screen").style.display = "none";
        document.getElementById("dashboard-screen").style.display = "block";
        document.getElementById("admin-username").textContent = name;
        document.getElementById("admin-avatar-letter").textContent =
          name[0].toUpperCase();
        await loadAllData();
        renderDashboard();
      }
      async function loadAllData() {
        try {
          const s = await getDocs(
            query(collection(db, "products"), orderBy("createdAt", "desc")),
          );
          ADMIN.products = s.docs.map((d) => ({ id: d.id, ...d.data() }));
        } catch (_) {
          ADMIN.products = [];
        }
        try {
          const s = await getDocs(
            query(collection(db, "orders"), orderBy("createdAt", "desc")),
          );
          ADMIN.orders = s.docs.map((d) => ({ firebaseId: d.id, ...d.data() }));
        } catch (_) {
          ADMIN.orders = [];
        }
        try {
          const s = await getDocs(collection(db, "coupons"));
          ADMIN.coupons = s.docs.map((d) => ({
            firebaseId: d.id,
            ...d.data(),
          }));
        } catch (_) {
          ADMIN.coupons = [];
        }
        try {
          const s = await getDocs(collection(db, "settings"));
          s.docs.forEach((d) => {
            const data = d.data();
            if (d.id === "shipping" || data.id === "shipping") {
              ADMIN.shipping = data;
              ADMIN.shippingDocId = d.id;
            }
          });
        } catch (_) {}
        try {
          const s = await getDocs(collection(db, "categories"));
          ADMIN.categories = s.docs.map((d) => ({
            firebaseId: d.id,
            ...d.data(),
          }));
        } catch (_) {
          ADMIN.categories = [];
        }
        try {
          const s = await getDocs(
            query(
              collection(db, "catalogProducts"),
              orderBy("createdAt", "desc"),
            ),
          );
          ADMIN.catalogProducts = s.docs.map((d) => ({
            id: d.id,
            ...d.data(),
          }));
        } catch (_) {
          ADMIN.catalogProducts = [];
        }
      }

      // ── NAV ──
      window.adminNav = function (section, btn) {
        document
          .querySelectorAll(".admin-nav-item")
          .forEach((b) => b.classList.remove("active"));
        if (btn) btn.classList.add("active");
        const titles = {
          dashboard: "Dashboard",
          orders: "Orders",
          products: "Products",
          catalog: "Catalog Upload",
          categories: "Categories",
          coupons: "Coupons",
          customers: "Customers",
          shipping: "Shipping Rates",
        };
        document.getElementById("admin-page-title").textContent =
          titles[section] || section;
        ({
          dashboard: renderDashboard,
          orders: renderOrders,
          products: renderProducts,
          catalog: renderCatalog,
          categories: renderCategories,
          coupons: renderCoupons,
          customers: renderCustomers,
          shipping: renderShipping,
        })[section]?.();
      };

      // ── DASHBOARD ──
      function renderDashboard() {
        const o = ADMIN.orders,
          p = ADMIN.products,
          rev = o.reduce((s, x) => s + (x.total || 0), 0),
          pend = o.filter((x) => x.status === "pending").length;
        document.getElementById("admin-content-area").innerHTML = `
        <div class="stats-grid">
          <div class="stat-card"><div class="stat-icon">&#128230;</div><div class="stat-val">${o.length}</div><div class="stat-label">Total Orders</div></div>
          <div class="stat-card"><div class="stat-icon">&#9203;</div><div class="stat-val">${pend}</div><div class="stat-label">Pending</div></div>
          <div class="stat-card"><div class="stat-icon">&#128182;</div><div class="stat-val">&#8364;${rev.toLocaleString()}</div><div class="stat-label">Revenue</div></div>
          <div class="stat-card"><div class="stat-icon">&#128247;</div><div class="stat-val">${p.length}</div><div class="stat-label">Products</div></div>
        </div>
        <div class="admin-table-card" style="margin-bottom:20px">
          <div class="admin-table-head"><h3>Recent Orders</h3><button class="btn btn-outline btn-sm" onclick="adminNav('orders',null)">View All</button></div>
          <div style="overflow-x:auto"><table class="data-table"><thead><tr><th>Order ID</th><th>Customer</th><th>Total</th><th>Status</th><th>Date</th><th>Action</th></tr></thead>
          <tbody>${o
            .slice(0, 5)
            .map(
              (x) =>
                `<tr><td><strong>${x.id || "—"}</strong></td><td>${x.customer || "—"}</td><td>&#8364;${(x.total || 0).toLocaleString()}</td><td><span class="status-badge status-${x.status || "pending"}">${x.status || "pending"}</span></td><td>${(x.date || "").substr(0, 10)}</td><td><button class="btn btn-outline btn-sm" onclick="editOrder('${x.firebaseId || x.id}')">View</button></td></tr>`,
            )
            .join("")}</tbody></table></div>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px">
          <div class="admin-table-card"><div class="admin-table-head"><h3>Quick Actions</h3></div>
            <div style="padding:24px;display:flex;flex-direction:column;gap:10px">
              <button class="btn btn-primary btn-full" onclick="showProductModal()">+ Add New Product</button>
              <button class="btn btn-outline btn-full" onclick="adminNav('catalog',null)">&#128247; Catalog Upload</button>
              <button class="btn btn-outline btn-full" onclick="adminNav('orders',null)">&#128230; Manage Orders</button>
              <button class="btn btn-outline btn-full" onclick="adminNav('coupons',null)">&#127915; Manage Coupons</button>
            </div>
          </div>
          <div class="admin-table-card"><div class="admin-table-head"><h3>Recent Products</h3></div>
            <div style="padding:0 20px 16px">${p
              .slice(0, 5)
              .map(
                (x) => `
              <div style="display:flex;gap:10px;align-items:center;padding:10px 0;border-bottom:1px solid var(--gray-100)">
                <img src="${x.images?.[0] || ""}" style="width:40px;height:46px;object-fit:cover;background:var(--gray-100);border-radius:3px" onerror="this.src=''">
                <div style="flex:1"><div style="font-size:0.85rem;font-weight:600">${x.name || "—"}</div><div style="font-size:0.74rem;color:var(--gray-400)">&#8364;${(x.price || 0).toLocaleString()} &middot; ${x.category || ""}</div></div>
                <button class="btn btn-outline btn-sm" onclick="showProductModal(ADMIN.products.find(p=>p.id==='${x.id}'))">Edit</button>
              </div>`,
              )
              .join("")}</div>
          </div>
        </div>`;
      }

      // ── ORDERS ──
      function renderOrders() {
        document.getElementById("admin-content-area").innerHTML = `
        <div class="admin-table-card">
          <div class="admin-table-head"><h3>All Orders (${ADMIN.orders.length})</h3>
            <div style="display:flex;gap:8px;align-items:center">
              <input type="text" placeholder="Search..." oninput="filterOrderTable(this.value)" style="padding:8px 12px;border:1.5px solid var(--gray-200);border-radius:var(--radius-sm);font-family:var(--font-body);font-size:0.85rem;outline:none;width:180px">
              <select id="order-status-filter" onchange="filterOrderTable('')" style="padding:8px 12px;border:1.5px solid var(--gray-200);border-radius:var(--radius-sm);font-family:var(--font-body);font-size:0.85rem;outline:none">
                <option value="">All Status</option><option>pending</option><option>confirmed</option><option>shipped</option><option>delivered</option><option>cancelled</option>
              </select>
            </div>
          </div>
          <div style="overflow-x:auto"><table class="data-table"><thead><tr><th>Order ID</th><th>Customer</th><th>Phone</th><th>Items</th><th>Total</th><th>Payment</th><th>Status</th><th>Date</th><th>Actions</th></tr></thead>
          <tbody id="orders-tbody">${ADMIN.orders
            .map((o) => {
              const fid = o.firebaseId || o.id,
                ic = Array.isArray(o.items)
                  ? o.items.reduce((s, i) => s + (i.qty || 1), 0)
                  : o.items || 0;
              return `<tr data-id="${o.id}" data-customer="${(o.customer || "").toLowerCase()}" data-status="${o.status || "pending"}">
              <td><strong style="font-size:0.8rem">${o.id || "—"}</strong></td>
              <td><div style="font-weight:600;font-size:0.86rem">${o.customer || "—"}</div><div style="font-size:0.74rem;color:var(--gray-400)">${o.email || ""}</div></td>
              <td style="font-size:0.84rem">${o.phone || "—"}</td><td style="font-size:0.84rem">${ic} item${ic !== 1 ? "s" : ""}</td>
              <td><strong>&#8364;${(o.total || 0).toLocaleString()}</strong></td>
              <td style="font-size:0.8rem">${o.payment || "cod"}</td>
              <td><select onchange="updateOrderStatus('${fid}',this.value)" style="padding:5px 8px;font-size:0.78rem;border:1.5px solid var(--gray-200);border-radius:4px;font-family:var(--font-body);outline:none;cursor:pointer">
                ${["pending", "confirmed", "shipped", "delivered", "cancelled"].map((s) => `<option value="${s}" ${o.status === s ? "selected" : ""}>${s}</option>`).join("")}
              </select></td>
              <td style="font-size:0.8rem;color:var(--gray-400)">${(o.date || "").substr(0, 10)}</td>
              <td><button class="btn btn-outline btn-sm" onclick="editOrder('${fid}')">View</button></td>
            </tr>`;
            })
            .join("")}</tbody></table></div>
        </div>`;
      }
      window.filterOrderTable = function (q) {
        const sf = document.getElementById("order-status-filter")?.value || "";
        document.querySelectorAll("#orders-tbody tr").forEach((r) => {
          r.style.display =
            (!q ||
              r.dataset.customer?.includes(q.toLowerCase()) ||
              r.dataset.id?.toLowerCase().includes(q.toLowerCase())) &&
            (!sf || r.dataset.status === sf)
              ? ""
              : "none";
        });
      };
      window.updateOrderStatus = async function (fid, status) {
        try {
          await updateDoc(doc(db, "orders", fid), {
            status,
            updatedAt: new Date().toISOString(),
          });
          const o = ADMIN.orders.find((o) => (o.firebaseId || o.id) === fid);
          if (o) o.status = status;
          showToast("Status updated", "success");
        } catch (e) {
          showToast("Failed: " + e.message, "error");
        }
      };
      window.editOrder = function (fid) {
        const o = ADMIN.orders.find((o) => (o.firebaseId || o.id) === fid);
        if (!o) return;
        const ih = Array.isArray(o.items)
          ? o.items
              .map(
                (i) =>

        showModal(`<div class="modal-header"><h3>Order: ${o.id}</h3><button onclick="closeModal()" style="background:none;border:none;cursor:pointer;font-size:1.3rem;color:var(--gray-400)">&#x2715;</button></div>
          <div class="modal-body"><div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;font-size:0.85rem;margin-bottom:14px">

            <div><span style="color:var(--gray-400)">Date:</span> ${(o.date || "").substr(0, 10)}</div>
            <div style="grid-column:1/-1"><span style="color:var(--gray-400)">Address:</span> ${o.address || "—"}</div>
            ${o.notes ? `<div style="grid-column:1/-1"><span style="color:var(--gray-400)">Notes:</span> ${o.notes}</div>` : ""}
