            <div><span style="color:var(--gray-400)">Subtotal:</span> &#8364;${((o.total || 0) - (o.shipping || 0)).toLocaleString()}</div>
            <div><span style="color:var(--gray-400)">Shipping:</span> &#8364;${(o.shipping || 0).toLocaleString()}</div>
            <div><strong>Total: &#8364;${(o.total || 0).toLocaleString()}</strong></div><div><span style="color:var(--gray-400)">Payment:</span> ${o.payment || "cod"}</div>
          </div>
          <div style="margin-top:18px"><label style="font-size:0.74rem;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;display:block;margin-bottom:7px">Update Status</label>
            <select id="status-update-select" style="padding:10px 14px;border:1.5px solid var(--gray-200);border-radius:var(--radius-sm);font-family:var(--font-body);font-size:0.88rem;outline:none;width:100%">
              ${["pending", "confirmed", "shipped", "delivered", "cancelled"].map((s) => `<option value="${s}" ${o.status === s ? "selected" : ""}>${s}</option>`).join("")}
            </select></div>
          </div>
          <div class="modal-footer"><button class="btn btn-outline" onclick="closeModal()">Close</button><button class="btn btn-gold" onclick="saveOrderStatus('${fid}')">Save Status</button></div>`);
      };
      window.saveOrderStatus = async function (fid) {
        const s = document.getElementById("status-update-select")?.value;
        if (!s) return;
        await updateOrderStatus(fid, s);
        closeModal();
        renderOrders();
      };

      // ── PRODUCTS ──
      let productFormImages = [],
        productSizeGuide = [];
      function renderProducts() {
        document.getElementById("admin-content-area").innerHTML =
          `<div class="admin-table-card">
          <div class="admin-table-head"><h3>Products (${ADMIN.products.length})</h3><button class="btn btn-primary btn-sm" onclick="showProductModal()">+ Add Product</button></div>
          <div style="overflow-x:auto"><table class="data-table"><thead><tr><th>Product</th><th>Category</th><th>Price</th><th>Sizes</th><th>Badge</th><th>Featured</th><th>Stock</th><th>Actions</th></tr></thead>
          <tbody>${ADMIN.products
            .map(
              (p) => `<tr>
            <td style="display:flex;gap:10px;align-items:center"><img src="${p.images?.[0] || ""}" style="width:40px;height:48px;object-fit:cover;background:var(--gray-100);border-radius:3px" onerror="this.src=''">
              <div><div style="font-weight:600;font-size:0.86rem">${p.name || "—"}</div><div style="font-size:0.72rem;color:var(--gray-400)">${p.id}</div></div></td>
            <td><span style="font-size:0.8rem;background:var(--cream);padding:3px 7px;border-radius:3px">${p.category || "—"}</span></td>
            <td><strong>&#8364;${(p.price || 0).toLocaleString()}</strong>${p.originalPrice ? `<br><span style="font-size:0.72rem;text-decoration:line-through;color:var(--gray-400)">&#8364;${p.originalPrice.toLocaleString()}</span>` : ""}</td>
            <td style="font-size:0.8rem">${(p.sizes || []).join(", ") || "—"}</td>
            <td>${p.badge ? `<span class="product-badge badge-${p.badge}">${p.badge}</span>` : "—"}</td>
            <td style="text-align:center">${p.featured ? "&#11088;" : "—"}</td>
            <td style="text-align:center">${p.inStock !== false ? '<span style="color:var(--success);font-size:0.8rem">&#10003; In Stock</span>' : '<span style="color:var(--danger);font-size:0.8rem">&#x2717; Out</span>'}</td>
            <td><div style="display:flex;gap:6px">
              <button class="btn btn-outline btn-sm" onclick="showProductModal(ADMIN.products.find(x=>x.id==='${p.id}'))">Edit</button>
              <button class="btn btn-sm" style="background:var(--danger);color:white;border:none;border-radius:4px" onclick="deleteProduct('${p.id}')">Del</button>
            </div></td>
          </tr>`,
            )
            .join("")}</tbody></table></div></div>`;
      }
      window.deleteProduct = async function (id) {
        if (!confirm("Delete this product?")) return;
        try {
          await deleteDoc(doc(db, "products", id));
          ADMIN.products = ADMIN.products.filter((p) => p.id !== id);
          renderProducts();
          showToast("Deleted", "success");
        } catch (e) {
          showToast("Delete failed: " + e.message, "error");
        }
      };
      window.showProductModal = function (p = null) {
        productFormImages =
          p && p.images ? p.images.map((url) => ({ url })) : [];
        productSizeGuide = p && p.sizeGuide ? [...p.sizeGuide] : [];
        showModal(`<div class="modal-header"><h3>${p ? "Edit" : "Add"} Product</h3><button onclick="closeModal()" style="background:none;border:none;cursor:pointer;font-size:1.3rem;color:var(--gray-400)">&#x2715;</button></div>
          <div class="modal-body" style="max-height:70vh;overflow-y:auto">
            <div class="product-block"><h4>Basic Information</h4>
              <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
                <div class="desc-field" style="grid-column:1/-1"><label>Product Name *</label><input type="text" id="pf-name" value="${p?.name || ""}"></div>
                <div class="desc-field"><label>Price (EUR) *</label><input type="number" id="pf-price" value="${p?.price || ""}"></div>
                <div class="desc-field"><label>Original Price (EUR)</label><input type="number" id="pf-oprice" value="${p?.originalPrice || ""}"></div>
                <div class="desc-field"><label>Category</label><select id="pf-cat">${ADMIN.categories.map((c) => `<option value="${c.slug}" ${p?.category === c.slug ? "selected" : ""}>${c.name}</option>`).join("")}</select></div>
                <div class="desc-field"><label>Badge</label><select id="pf-badge"><option value="">None</option>${["new", "sale", "hot", "limited"].map((b) => `<option value="${b}" ${p?.badge === b ? "selected" : ""}>${b}</option>`).join("")}</select></div>
                <div class="desc-field" style="grid-column:1/-1">
                  <label style="display:flex;align-items:center;gap:8px;text-transform:none;letter-spacing:0;font-size:0.85rem;cursor:pointer"><input type="checkbox" id="pf-featured" ${p?.featured ? "checked" : ""}> Featured Product</label>
                  <label style="display:flex;align-items:center;gap:8px;text-transform:none;letter-spacing:0;font-size:0.85rem;cursor:pointer;margin-top:6px"><input type="checkbox" id="pf-instock" ${p?.inStock !== false ? "checked" : ""}> In Stock</label>
                </div>
              </div>
            </div>
            <div class="product-block"><h4>Description</h4>
              <div class="desc-field"><label>Description</label><textarea id="pf-desc" rows="3">${p?.description || ""}</textarea></div>
              <div class="desc-field"><label>Material</label><input type="text" id="pf-material" value="${p?.material || ""}"></div>
              <div class="desc-field"><label>Tags (comma separated)</label><input type="text" id="pf-tags" value="${(p?.tags || []).join(", ")}"></div>
            </div>
            <div class="product-block"><h4>Size Guide</h4>
              <div id="size-guide-list">${renderSGForm()}</div>
              <button class="btn btn-outline btn-sm" style="margin-top:8px" onclick="addSGRow()">+ Add Row</button>
            </div>
            <div class="product-block"><h4>Variations</h4>
              <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
                <div class="desc-field"><label>Sizes</label><input type="text" id="pf-sizes" placeholder="S, M, L, XL" value="${(p?.sizes || []).join(", ")}"></div>
                <div class="desc-field"><label>Colors (hex)</label><input type="text" id="pf-colors" placeholder="#1a1a1a" value="${(p?.colors || []).join(", ")}"></div>
              </div>
            </div>
            <div class="product-block"><h4>Images</h4>
              <div class="img-upload-area" onclick="document.getElementById('pf-img-upload').click()"><div style="font-size:1.8rem;margin-bottom:6px">&#128247;</div><div style="font-size:0.84rem;color:var(--gray-600)">Click to upload (max 3)</div></div>
              <input type="file" id="pf-img-upload" accept="image/*" multiple style="display:none" onchange="handleImageUpload(this)">
              <div class="desc-field" style="margin-top:10px"><label>Or paste URL</label>
                <div style="display:flex;gap:8px"><input type="text" id="pf-img-url" placeholder="https://..."><button class="btn btn-outline btn-sm" onclick="addImageUrl()">Add</button></div>
              </div>
              <div class="img-preview" id="img-preview">${renderImgPreviews()}</div>
            </div>
          </div>
          <div class="modal-footer"><button class="btn btn-outline" onclick="closeModal()">Cancel</button><button class="btn btn-gold" id="save-product-btn" onclick="saveProduct(${p ? `'${p.id}'` : "null"})">${p ? "Save Changes" : "Add Product"}</button></div>`);
      };
      function renderSGForm() {
        if (!productSizeGuide.length)
          return `<p style="font-size:0.8rem;color:var(--gray-400)">No rows.</p>`;
        return `<div class="size-guide-header"><span>Size</span><span>Height</span><span>Width</span><span></span></div>${productSizeGuide.map((r, i) => `<div class="size-guide-row"><input class="sg-size" style="padding:8px;border:1.5px solid var(--gray-200);border-radius:4px;font-family:var(--font-body);font-size:0.84rem;outline:none" value="${r.size}"><input class="sg-height" style="padding:8px;border:1.5px solid var(--gray-200);border-radius:4px;font-family:var(--font-body);font-size:0.84rem;outline:none" value="${r.height}"><input class="sg-width" style="padding:8px;border:1.5px solid var(--gray-200);border-radius:4px;font-family:var(--font-body);font-size:0.84rem;outline:none" value="${r.width}"><button onclick="removeSGRow(${i})" style="background:var(--danger);color:white;border:none;cursor:pointer;width:26px;height:26px;font-size:0.75rem;border-radius:50%">&#x2715;</button></div>`).join("")}`;
      }
      function renderImgPreviews() {
        return productFormImages
          .map(
            (img, i) =>
              `<div class="img-preview-item"><img src="${img.url}" alt=""><button onclick="removeImage(${i})">&#x2715;</button></div>`,
          )
          .join("");
      }
      window.addSGRow = function () {
        collectSG();
        productSizeGuide.push({ size: "", height: "", width: "" });
        document.getElementById("size-guide-list").innerHTML = renderSGForm();
      };
      window.removeSGRow = function (i) {
        collectSG();
        productSizeGuide.splice(i, 1);
        document.getElementById("size-guide-list").innerHTML = renderSGForm();
      };
      function collectSG() {
        productSizeGuide = Array.from(
          document.querySelectorAll("#size-guide-list .size-guide-row"),
        ).map((r) => ({
          size: r.querySelector(".sg-size")?.value || "",
          height: r.querySelector(".sg-height")?.value || "",
          width: r.querySelector(".sg-width")?.value || "",
        }));
      }
      window.handleImageUpload = function (i) {
        Array.from(i.files)
          .slice(0, 3 - productFormImages.length)
          .forEach((f) => {
            productFormImages.push({ url: URL.createObjectURL(f), file: f });
          });
        document.getElementById("img-preview").innerHTML = renderImgPreviews();
      };
      window.removeImage = function (i) {
        productFormImages.splice(i, 1);
        document.getElementById("img-preview").innerHTML = renderImgPreviews();
      };
      window.addImageUrl = function () {
        const u = document.getElementById("pf-img-url")?.value.trim();
        if (!u) return;
        if (productFormImages.length >= 3) {
          showToast("Max 3 images", "error");
          return;
        }
        productFormImages.push({ url: u });
        document.getElementById("img-preview").innerHTML = renderImgPreviews();
        document.getElementById("pf-img-url").value = "";
      };
      window.saveProduct = async function (eid) {
        const name = document.getElementById("pf-name")?.value?.trim(),
          price = parseFloat(document.getElementById("pf-price")?.value);
        if (!name || !price) {
          showToast("Name and price required", "error");
          return;
        }
        const btn = document.getElementById("save-product-btn");
        if (btn) {
          btn.innerHTML = '<span class="spinner"></span> Saving...';
          btn.disabled = true;
        }
        collectSG();
        try {
          const urls = [];
          for (const img of productFormImages) {
            if (img.file) {
              const r = sRef(
                storage,
                `products/${eid || "p" + Date.now()}/${img.file.name}`,
              );
              await uploadBytes(r, img.file);
              urls.push(await getDownloadURL(r));
            } else if (img.url) urls.push(img.url);
          }
          if (!urls.length)
            urls.push(
              "https://images.unsplash.com/photo-1620799140408-edc6dcb6d633?w=600",
            );
          const op =
            parseFloat(document.getElementById("pf-oprice")?.value) || null;
          const data = {
            name,
            price,
            originalPrice: op,
            discount: op ? Math.round(((op - price) / op) * 100) : 0,
            category: document.getElementById("pf-cat")?.value,
            badge: document.getElementById("pf-badge")?.value || null,
            featured: document.getElementById("pf-featured")?.checked || false,
            inStock: document.getElementById("pf-instock")?.checked !== false,
            description: document.getElementById("pf-desc")?.value || "",
            material: document.getElementById("pf-material")?.value || "",
            tags: (document.getElementById("pf-tags")?.value || "")
              .split(",")
              .map((t) => t.trim())
              .filter(Boolean),
            sizes: (document.getElementById("pf-sizes")?.value || "")
              .split(",")
              .map((s) => s.trim())
              .filter(Boolean),
            colors: (document.getElementById("pf-colors")?.value || "#1a1a1a")
              .split(",")
              .map((c) => c.trim())
              .filter(Boolean),
            images: urls,
            sizeGuide: productSizeGuide.filter((r) => r.size),
            updatedAt: new Date().toISOString(),
          };
          if (eid) {
            await updateDoc(doc(db, "products", eid), data);
            const i = ADMIN.products.findIndex((p) => p.id === eid);
            if (i > -1) ADMIN.products[i] = { ...data, id: eid };
            showToast("Updated!", "success");
          } else {
            data.createdAt = new Date().toISOString();
            data.rating = 5;
            data.reviews = 0;
            const r = await addDoc(collection(db, "products"), data);
            ADMIN.products.unshift({ ...data, id: r.id });
            showToast("Added!", "success");
          }
          closeModal();
          renderProducts();
        } catch (e) {
          showToast("Save failed: " + e.message, "error");
        } finally {
          if (btn) {
            btn.innerHTML = eid ? "Save Changes" : "Add Product";
            btn.disabled = false;
          }
        }
      };

      // ════════════════════════════════════════════
      // CATALOG UPLOAD — multi-image (up to 4)
      // ════════════════════════════════════════════
      const MAX_CAT_IMGS = 4;
      let catalogSelectedSizes = new Set();
      let catalogUploadImages = []; // [{url,file?,isMain}]

      function genCatalogId() {
        const c = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
        return (
          "LX-" +
          Array.from(
            { length: 6 },
            () => c[Math.floor(Math.random() * c.length)],
          ).join("")
        );
      }
      const CAT_CATEGORIES = [
        "Panjabi",
        "Shirt",
        "T-shirt",
        "Pant",
        "Polo Shirt",
      ];

      // Renders thumbnail strip used in both upload form & edit modal
      function renderImgStrip(stripId, imgs, removeFn, mainFn) {
        const el = document.getElementById(stripId);
        if (!el) return;
        el.innerHTML = imgs
          .map(
            (img, i) => `
          <div class="multi-img-thumb ${img.isMain ? "is-main" : ""}">
            <img src="${img.url}" alt="photo ${i + 1}">
            <button class="thumb-del" onclick="${removeFn}(${i})" title="Remove">&#x2715;</button>
            ${
              img.isMain
                ? `<span class="thumb-main-label">&#9733; Main</span>`
                : `<button class="thumb-set-main" onclick="${mainFn}(${i})" title="Set as cover">&#9733; Cover</button>`
            }
          </div>`,
          )
          .join("");
      }

      function syncZoneUI(zoneId, promptId, count) {
        const zone = document.getElementById(zoneId),
          prompt = document.getElementById(promptId);
        if (!zone || !prompt) return;
        if (count >= MAX_CAT_IMGS) zone.classList.add("maxed");
        else zone.classList.remove("maxed");
        prompt.innerHTML =
          count === 0
            ? `<div style="font-size:2rem;margin-bottom:6px">&#128247;</div><div style="font-size:0.82rem;color:var(--gray-600)"><strong>Click or drag images</strong><br>JPG, PNG, WEBP &middot; Up to ${MAX_CAT_IMGS} photos</div>`
            : `<div style="font-size:1.3rem;margin-bottom:4px">&#10133;</div><div style="font-size:0.8rem;color:var(--gray-600)">${count}/${MAX_CAT_IMGS} added &mdash; click to add more</div>`;
      }

      function renderCatalog() {
        catalogUploadImages = [];
        catalogSelectedSizes.clear();
        document.getElementById("admin-content-area").innerHTML = `
        <div style="display:grid;grid-template-columns:360px 1fr;gap:24px;align-items:start">
          <!-- UPLOAD FORM -->
          <div class="admin-table-card">
            <div class="admin-table-head"><h3>&#128247; Upload Product</h3></div>
            <div style="padding:20px;display:flex;flex-direction:column;gap:14px">
              <div>
                <label style="font-size:0.72rem;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--gray-600);display:block;margin-bottom:6px">
                  Product Images * <span style="font-weight:400;color:var(--gray-400);letter-spacing:0;text-transform:none;font-size:0.74rem">up to ${MAX_CAT_IMGS}</span>
                </label>
                <div class="multi-upload-zone" id="catDropZone">
                  <input type="file" id="catImageFiles" accept="image/*" multiple onchange="catHandleFiles(event)">
                  <div id="catUploadPrompt">
                    <div style="font-size:2rem;margin-bottom:6px">&#128247;</div>
                    <div style="font-size:0.82rem;color:var(--gray-600)"><strong>Click or drag images</strong><br>JPG, PNG, WEBP &middot; Up to ${MAX_CAT_IMGS} photos</div>
                  </div>
                </div>
                <div class="multi-img-strip" id="catImgStrip"></div>
                <div class="upload-count-note" id="catImgNote"></div>
              </div>
              <div class="form-group"><label>Product Name *</label><input type="text" id="catProductName" placeholder="e.g. Royal Embroidered Panjabi"></div>
              <div class="form-group"><label>Product ID</label><input type="text" id="catProductId" readonly></div>
              <div class="form-group"><label>Category *</label>
                <select id="catCategory"><option value="">— Select Category —</option>${CAT_CATEGORIES.map((c) => `<option>${c}</option>`).join("")}</select>
              </div>
              <div class="form-group"><label>Price (EUR) <span style="font-weight:400;color:var(--gray-400);letter-spacing:0;text-transform:none;font-size:0.75rem">optional</span></label>
                <input type="number" id="catPrice" placeholder="e.g. 1200" min="0" step="1">
              </div>
              <div>
                <label style="font-size:0.72rem;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--gray-600);display:block;margin-bottom:8px">Available Sizes</label>
                <div class="sizes-grid" id="catSizesGrid">${["S", "M", "L", "XL", "XXL", "38", "40", "42", "44"].map((s) => `<div class="size-chip" onclick="toggleCatSize(this,'${s}')">${s}</div>`).join("")}</div>
                <div style="display:flex;gap:8px;margin-top:10px">
                  <input type="text" id="catCustomSize" placeholder="Custom size" style="flex:1;padding:9px 12px;border:1.5px solid var(--gray-200);border-radius:var(--radius-sm);font-family:var(--font-body);font-size:0.84rem;outline:none">
                  <button class="btn btn-outline btn-sm" onclick="addCatCustomSize()">+</button>
                </div>
              </div>
              <button class="btn btn-gold btn-full" id="catSaveBtn" onclick="saveCatalogProduct()" style="margin-top:4px">
                <span class="cat-btn-text">Save to Catalog</span>
                <span class="spinner" style="display:none;border-top-color:var(--black)"></span>
              </button>
            </div>
          </div>

          <!-- CATALOG GRID -->
          <div>
            <div style="display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap">
              <div style="flex:1;min-width:180px;display:flex;align-items:center;gap:8px;background:var(--white);border-radius:var(--radius-sm);padding:10px 14px;box-shadow:var(--shadow)">
                <span style="color:var(--gray-400)">&#128269;</span>
                <input type="text" placeholder="Search by name or ID..." oninput="filterCatalog(this.value)" style="border:none;background:none;font-family:var(--font-body);font-size:0.88rem;outline:none;width:100%;color:var(--black)">
              </div>
            </div>
            <div style="display:flex;gap:7px;flex-wrap:wrap;margin-bottom:18px" id="catFilterBar">
              ${["All", ...CAT_CATEGORIES].map((c, i) => `<button class="btn btn-sm btn-${i === 0 ? "primary" : "outline"}" onclick="setCatalogFilter('${c}',this)" style="border-radius:20px;padding:5px 14px">${c}</button>`).join("")}
            </div>
            <div class="catalog-grid" id="catalogGrid">${renderCatalogGrid(ADMIN.catalogProducts)}</div>
          </div>
        </div>`;
        document.getElementById("catProductId").value = genCatalogId();
      }

      // ── Gallery HTML builder ──
      function buildGallery(imgs, pid) {
        if (!imgs || !imgs.length)
          return `<div class="catalog-gallery"><div class="catalog-gallery-placeholder">&#128247;</div></div>`;
        if (imgs.length === 1)
          return `<div class="catalog-gallery"><div class="catalog-gallery-track"><div class="catalog-gallery-slide"><img src="${imgs[0]}" alt="" loading="lazy"></div></div></div>`;
        const slides = imgs
          .map(
            (u) =>
              `<div class="catalog-gallery-slide"><img src="${u}" alt="" loading="lazy"></div>`,
          )
          .join("");
        const dots = imgs
          .map(
            (_, i) =>
              `<button class="gallery-dot ${i === 0 ? "active" : ""}" onclick="galNav('${pid}',${i})"></button>`,
          )
          .join("");
        return `<div class="catalog-gallery" id="gal-${pid}">
          <div class="catalog-gallery-track" id="galtrack-${pid}">${slides}</div>
          <button class="gallery-nav gallery-prev" onclick="galStep('${pid}',-1)">&#8249;</button>
          <button class="gallery-nav gallery-next" onclick="galStep('${pid}',1)">&#8250;</button>
          <div class="gallery-dots" id="galdots-${pid}">${dots}</div>
          <div class="gallery-count">${imgs.length} photos</div>
        </div>`;
      }

      window._galIdx = {};
      window.galStep = function (pid, dir) {
        const p = ADMIN.catalogProducts.find((x) => x.id === pid);
        const imgs =
          Array.isArray(p?.images) && p.images.length
            ? p.images
            : p?.imageURL
              ? [p.imageURL]
              : [];
        if (!imgs.length) return;
        galNav(
          pid,
          ((window._galIdx[pid] || 0) + dir + imgs.length) % imgs.length,
        );
      };
      window.galNav = function (pid, idx) {
        window._galIdx[pid] = idx;
        const t = document.getElementById("galtrack-" + pid);
        if (t) t.style.transform = `translateX(-${idx * 100}%)`;
        const d = document.getElementById("galdots-" + pid);
        if (d)
          d.querySelectorAll(".gallery-dot").forEach((x, i) =>
            x.classList.toggle("active", i === idx),
          );
      };

      function renderCatalogGrid(products) {
        if (!products.length)
          return `<div style="grid-column:1/-1;text-align:center;padding:60px 20px;color:var(--gray-400)"><div style="font-size:2.5rem;margin-bottom:10px">&#128247;</div><h3 style="font-family:var(--font-display);color:var(--black);margin-bottom:6px">No products yet</h3><p style="font-size:0.85rem">Upload using the form.</p></div>`;
        return products
          .map((p, i) => {
            const imgs =
              Array.isArray(p.images) && p.images.length
                ? p.images
                : p.imageURL
                  ? [p.imageURL]
                  : [];
            return `<div class="catalog-card" style="animation-delay:${i * 0.04}s">
            ${buildGallery(imgs, p.id)}
            <div class="catalog-info">
              <div class="catalog-cat">${p.category || ""}</div>
              <div class="catalog-name">${p.productName || "—"}</div>
              <div class="catalog-id">#${p.productId}</div>
              ${p.price ? `<div class="catalog-price-tag">&#8364;${Number(p.price).toLocaleString()}</div>` : ""}
              <div class="catalog-sizes">${(p.sizes || []).map((s) => `<span class="size-badge">${s}</span>`).join("")}</div>
              <div class="catalog-action-row">
                <button class="cat-action-btn cat-action-edit" onclick="openEditCatalogModal('${p.id}')">&#9998; Edit</button>
                <button class="cat-action-btn cat-action-copy" onclick="copyCatalogInfo(this,${JSON.stringify(JSON.stringify(p))})">&#128203; Copy</button>
                <button class="cat-action-btn cat-action-del" onclick="deleteCatalogProduct('${p.id}')" style="flex:0.5">&#128465;</button>
              </div>
            </div>
          </div>`;
          })
          .join("");
      }

      // ── Upload form handlers ──
      window.catHandleFiles = function (e) {
        const rem = MAX_CAT_IMGS - catalogUploadImages.length,
          files = Array.from(e.target.files).slice(0, rem);
        if (!files.length && catalogUploadImages.length >= MAX_CAT_IMGS) {
          showToast(`Max ${MAX_CAT_IMGS} images`, "error");
          return;
        }
        files.forEach((file) => {
          const rd = new FileReader();
          rd.onload = (ev) => {
            catalogUploadImages.push({
              url: ev.target.result,
              file,
              isMain: catalogUploadImages.length === 0,
            });
            renderImgStrip(
              "catImgStrip",
              catalogUploadImages,
              "catRemoveImg",
              "catSetMain",
            );
            syncZoneUI(
              "catDropZone",
              "catUploadPrompt",
              catalogUploadImages.length,
            );
            const n = document.getElementById("catImgNote");
            if (n)
              n.textContent = `${catalogUploadImages.length}/${MAX_CAT_IMGS} image${catalogUploadImages.length !== 1 ? "s" : ""} added${catalogUploadImages.length > 0 ? " — first is cover" : ""}`;
          };
          rd.readAsDataURL(file);
        });
        e.target.value = "";
      };
      window.catRemoveImg = function (i) {
        catalogUploadImages.splice(i, 1);
        if (
          catalogUploadImages.length &&
          !catalogUploadImages.some((x) => x.isMain)
        )
          catalogUploadImages[0].isMain = true;
        renderImgStrip(
          "catImgStrip",
          catalogUploadImages,
          "catRemoveImg",
          "catSetMain",
        );
        syncZoneUI(
          "catDropZone",
          "catUploadPrompt",
          catalogUploadImages.length,
        );
        const n = document.getElementById("catImgNote");
        if (n)
          n.textContent = catalogUploadImages.length
            ? `${catalogUploadImages.length}/${MAX_CAT_IMGS} image${catalogUploadImages.length !== 1 ? "s" : ""} added`
            : "";
      };
      window.catSetMain = function (i) {
        catalogUploadImages.forEach((x, j) => (x.isMain = j === i));
        const m = catalogUploadImages.splice(i, 1)[0];
        catalogUploadImages.unshift(m);
        renderImgStrip(
          "catImgStrip",
          catalogUploadImages,
          "catRemoveImg",
          "catSetMain",
        );
      };
      window.toggleCatSize = function (c, s) {
        c.classList.toggle("checked");
        if (c.classList.contains("checked")) catalogSelectedSizes.add(s);
        else catalogSelectedSizes.delete(s);
      };
      window.addCatCustomSize = function () {
        const inp = document.getElementById("catCustomSize"),
          v = inp.value.trim();
        if (!v) return;
        if (catalogSelectedSizes.has(v)) {
          showToast("Already added", "error");
          return;
        }
        catalogSelectedSizes.add(v);
        const c = document.createElement("div");
        c.className = "size-chip checked";
        c.textContent = v;
        c.onclick = () => {
          c.classList.toggle("checked");
          if (c.classList.contains("checked")) catalogSelectedSizes.add(v);
          else catalogSelectedSizes.delete(v);
        };
        document.getElementById("catSizesGrid").appendChild(c);
        inp.value = "";
      };

      window.saveCatalogProduct = async function () {
        const name = document.getElementById("catProductName").value.trim(),
          id = document.getElementById("catProductId").value,
          cat = document.getElementById("catCategory").value;
        const pv = document.getElementById("catPrice")?.value.trim(),
          price = pv !== "" ? parseFloat(pv) : null;
        if (!name) {
          showToast("Enter product name", "error");
          return;
        }
        if (!cat) {
          showToast("Select a category", "error");
          return;
        }
        if (!catalogUploadImages.length) {
          showToast("Upload at least one image", "error");
          return;
        }
        if (!catalogSelectedSizes.size) {
          showToast("Select at least one size", "error");
          return;
        }
        const btn = document.getElementById("catSaveBtn"),
          bt = btn.querySelector(".cat-btn-text"),
          sp = btn.querySelector(".spinner");
        btn.disabled = true;
        bt.style.display = "none";
        sp.style.display = "inline-block";
        try {
          const urls = [];
          for (const img of catalogUploadImages) {
            const r = sRef(
              storage,
              `catalogProducts/${id}_${Date.now()}_${img.file.name}`,
            );
            await uploadBytes(r, img.file);
            urls.push(await getDownloadURL(r));
          }
          const data = {
            productName: name,
            productId: id,
            category: cat,
            sizes: Array.from(catalogSelectedSizes),
            images: urls,
            imageURL: urls[0] || "",
            createdAt: new Date().toISOString(),
          };
          if (price !== null && !isNaN(price)) data.price = price;
          const ref = await addDoc(collection(db, "catalogProducts"), data);
          ADMIN.catalogProducts.unshift({ id: ref.id, ...data });
          showToast("Saved to catalog!", "success");
          document.getElementById("catProductName").value = "";
          document.getElementById("catCategory").value = "";
          document.getElementById("catPrice").value = "";
          catalogUploadImages = [];
          renderImgStrip("catImgStrip", [], "catRemoveImg", "catSetMain");
          syncZoneUI("catDropZone", "catUploadPrompt", 0);
          const n = document.getElementById("catImgNote");
          if (n) n.textContent = "";
          document
            .querySelectorAll("#catSizesGrid .size-chip")
            .forEach((c) => c.classList.remove("checked"));
          catalogSelectedSizes.clear();
          document.getElementById("catProductId").value = genCatalogId();
          updateCatalogGrid();
        } catch (e) {
          showToast("Error: " + e.message, "error");
        } finally {
          btn.disabled = false;
          bt.style.display = "";
          sp.style.display = "none";
        }
      };

      // ── Edit Catalog Modal ──
      window.openEditCatalogModal = function (id) {
        const p = ADMIN.catalogProducts.find((x) => x.id === id);
        if (!p) return;
        const existImgs = (
          Array.isArray(p.images) && p.images.length
            ? p.images
            : p.imageURL
              ? [p.imageURL]
              : []
        ).map((url, i) => ({ url, isMain: i === 0 }));
        window._editImgs = [...existImgs];
        window._editSizes = new Set(p.sizes || []);
        const stdSizes = ["S", "M", "L", "XL", "XXL", "38", "40", "42", "44"],
          customSizes = (p.sizes || []).filter((s) => !stdSizes.includes(s)),
          allSizes = [...stdSizes, ...customSizes];
        showModal(`<div class="modal-header"><h3>Edit Catalog Product</h3><button onclick="closeModal()" style="background:none;border:none;cursor:pointer;font-size:1.3rem;color:var(--gray-400)">&#x2715;</button></div>
          <div class="modal-body">
            <div style="margin-bottom:18px">
              <label style="font-size:0.72rem;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--gray-600);display:block;margin-bottom:8px">Product Images <span style="font-weight:400;color:var(--gray-400);letter-spacing:0;text-transform:none;font-size:0.74rem">up to ${MAX_CAT_IMGS}</span></label>
              <div class="multi-upload-zone" id="editCatDropZone">
                <input type="file" id="editCatFiles" accept="image/*" multiple onchange="editCatHandleFiles(event)">
                <div id="editCatPrompt"><div style="font-size:1.3rem;margin-bottom:4px">&#10133;</div><div style="font-size:0.8rem;color:var(--gray-600)">Click to add images</div></div>
              </div>
              <div class="multi-img-strip" id="editCatImgStrip"></div>
              <div class="upload-count-note" id="editCatImgNote"></div>
            </div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px">
              <div class="form-group" style="grid-column:1/-1"><label>Product Name *</label><input type="text" id="editCatName" value="${p.productName || ""}"></div>
              <div class="form-group"><label>Product ID</label><input type="text" id="editCatId" value="${p.productId || ""}" readonly></div>
              <div class="form-group"><label>Category *</label><select id="editCatCat">${CAT_CATEGORIES.map((c) => `<option value="${c}" ${p.category === c ? "selected" : ""}>${c}</option>`).join("")}</select></div>
              <div class="form-group" style="grid-column:1/-1"><label>Price (EUR) <span style="font-weight:400;color:var(--gray-400);letter-spacing:0;text-transform:none;font-size:0.75rem">optional</span></label>
                <input type="number" id="editCatPrice" placeholder="e.g. 1200" min="0" step="1" value="${p.price || ""}">
              </div>
            </div>
            <div>
              <label style="font-size:0.72rem;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--gray-600);display:block;margin-bottom:8px">Available Sizes</label>
              <div class="sizes-grid" id="editCatSizesGrid">${allSizes.map((s) => `<div class="size-chip ${(p.sizes || []).includes(s) ? "checked" : ""}" onclick="toggleEditSize(this,'${s}')">${s}</div>`).join("")}</div>
              <div style="display:flex;gap:8px;margin-top:10px">
                <input type="text" id="editCatCustomSize" placeholder="Custom size" style="flex:1;padding:9px 12px;border:1.5px solid var(--gray-200);border-radius:var(--radius-sm);font-family:var(--font-body);font-size:0.84rem;outline:none">
                <button class="btn btn-outline btn-sm" onclick="addEditCatCustomSize()">+</button>
              </div>
            </div>
          </div>
          <div class="modal-footer"><button class="btn btn-outline" onclick="closeModal()">Cancel</button>
            <button class="btn btn-gold" id="editCatSaveBtn" onclick="saveEditCatalog('${id}')"><span class="ecbt">Save Changes</span><span class="spinner" style="display:none;border-top-color:var(--black)"></span></button>
          </div>`);
        // init strip
        renderImgStrip(
          "editCatImgStrip",
          window._editImgs,
          "editCatRemoveImg",
          "editCatSetMain",
        );
        syncZoneUI("editCatDropZone", "editCatPrompt", window._editImgs.length);
        const n = document.getElementById("editCatImgNote");
        if (n)
          n.textContent = `${window._editImgs.length}/${MAX_CAT_IMGS} image${window._editImgs.length !== 1 ? "s" : ""}${window._editImgs.length > 0 ? " — first is cover" : ""}`;
      };
      window.editCatHandleFiles = function (e) {
        const rem = MAX_CAT_IMGS - window._editImgs.length,
          files = Array.from(e.target.files).slice(0, rem);
        if (!files.length) {
          showToast(`Max ${MAX_CAT_IMGS} images`, "error");
          return;
        }
        files.forEach((file) => {
          const rd = new FileReader();
          rd.onload = (ev) => {
            window._editImgs.push({
              url: ev.target.result,
              file,
              isMain: window._editImgs.length === 0,
            });
            renderImgStrip(
              "editCatImgStrip",
              window._editImgs,
              "editCatRemoveImg",
              "editCatSetMain",
            );
            syncZoneUI(
              "editCatDropZone",
              "editCatPrompt",
              window._editImgs.length,
            );
            const n = document.getElementById("editCatImgNote");
            if (n)
              n.textContent = `${window._editImgs.length}/${MAX_CAT_IMGS} image${window._editImgs.length !== 1 ? "s" : ""} — first is cover`;
          };
          rd.readAsDataURL(file);
        });
        e.target.value = "";
      };
      window.editCatRemoveImg = function (i) {
        window._editImgs.splice(i, 1);
        if (window._editImgs.length && !window._editImgs.some((x) => x.isMain))
          window._editImgs[0].isMain = true;
        renderImgStrip(
          "editCatImgStrip",
          window._editImgs,
          "editCatRemoveImg",
          "editCatSetMain",
        );
        syncZoneUI("editCatDropZone", "editCatPrompt", window._editImgs.length);
        const n = document.getElementById("editCatImgNote");
        if (n)
          n.textContent = window._editImgs.length
            ? `${window._editImgs.length}/${MAX_CAT_IMGS} image${window._editImgs.length !== 1 ? "s" : ""} — first is cover`
            : "";
      };
      window.editCatSetMain = function (i) {
        window._editImgs.forEach((x, j) => (x.isMain = j === i));
        const m = window._editImgs.splice(i, 1)[0];
        window._editImgs.unshift(m);
        renderImgStrip(
          "editCatImgStrip",
          window._editImgs,
          "editCatRemoveImg",
          "editCatSetMain",
        );
      };
      window.toggleEditSize = function (c, s) {
        c.classList.toggle("checked");
        if (c.classList.contains("checked")) window._editSizes.add(s);
        else window._editSizes.delete(s);
      };
      window.addEditCatCustomSize = function () {
        const inp = document.getElementById("editCatCustomSize"),
          v = inp.value.trim();
        if (!v) return;
        if (window._editSizes.has(v)) {
          showToast("Already added", "error");
          return;
        }
        window._editSizes.add(v);
        const c = document.createElement("div");
        c.className = "size-chip checked";
        c.textContent = v;
        c.onclick = () => {
          c.classList.toggle("checked");
          if (c.classList.contains("checked")) window._editSizes.add(v);
          else window._editSizes.delete(v);
        };
        document.getElementById("editCatSizesGrid").appendChild(c);
        inp.value = "";
      };
      window.saveEditCatalog = async function (id) {
        const name = document.getElementById("editCatName")?.value.trim(),
          cat = document.getElementById("editCatCat")?.value;
        const pv = document.getElementById("editCatPrice")?.value.trim(),
          price = pv !== "" ? parseFloat(pv) : null;
        if (!name) {
          showToast("Name required", "error");
          return;
        }
        if (!cat) {
          showToast("Select category", "error");
          return;
        }
        if (!window._editSizes.size) {
          showToast("Select at least one size", "error");
          return;
        }
        if (!window._editImgs.length) {
          showToast("At least one image required", "error");
          return;
        }
        const btn = document.getElementById("editCatSaveBtn"),
          bt = btn?.querySelector(".ecbt"),
          sp = btn?.querySelector(".spinner");
        if (btn) btn.disabled = true;
        if (bt) bt.style.display = "none";
        if (sp) sp.style.display = "inline-block";
        try {
          const p = ADMIN.catalogProducts.find((x) => x.id === id),
            urls = [];
          for (const img of window._editImgs) {
            if (img.file) {
              const r = sRef(
                storage,
                `catalogProducts/${p?.productId || id}_${Date.now()}_${img.file.name}`,
              );
              await uploadBytes(r, img.file);
              urls.push(await getDownloadURL(r));
            } else urls.push(img.url);
          }
          const data = {
            productName: name,
            category: cat,
            sizes: Array.from(window._editSizes),
            images: urls,
            imageURL: urls[0] || "",
            updatedAt: new Date().toISOString(),
          };
          if (price !== null && !isNaN(price)) data.price = price;
          else data.price = null;
          await updateDoc(doc(db, "catalogProducts", id), data);
          const idx = ADMIN.catalogProducts.findIndex((x) => x.id === id);
          if (idx > -1)
            ADMIN.catalogProducts[idx] = {
              ...ADMIN.catalogProducts[idx],
              ...data,
            };
          showToast("Updated!", "success");
          closeModal();
          updateCatalogGrid();
        } catch (e) {
          showToast("Error: " + e.message, "error");
        } finally {
          if (btn) btn.disabled = false;
          if (bt) bt.style.display = "";
          if (sp) sp.style.display = "none";
        }
      };

      // ── Filter/Search ──
      let catActiveFilter = "All",
        catSearchQ = "";
      window.filterCatalog = function (q) {
        catSearchQ = q.toLowerCase();
        updateCatalogGrid();
      };
      window.setCatalogFilter = function (cat, btn) {
        catActiveFilter = cat;
        document.querySelectorAll("#catFilterBar button").forEach((b) => {
          b.className = "btn btn-sm btn-outline";
          b.style.borderRadius = "20px";
          b.style.padding = "5px 14px";
        });
        btn.className = "btn btn-sm btn-primary";
        btn.style.borderRadius = "20px";
        btn.style.padding = "5px 14px";
        updateCatalogGrid();
      };
      function updateCatalogGrid() {
        document.getElementById("catalogGrid").innerHTML = renderCatalogGrid(
          ADMIN.catalogProducts.filter(
            (p) =>
              (!catSearchQ ||
                p.productName?.toLowerCase().includes(catSearchQ) ||
                p.productId?.toLowerCase().includes(catSearchQ)) &&
              (catActiveFilter === "All" || p.category === catActiveFilter),
          ),
        );
      }

      window.deleteCatalogProduct = async function (id) {
        if (!confirm("Delete?")) return;
        try {
          await deleteDoc(doc(db, "catalogProducts", id));
          ADMIN.catalogProducts = ADMIN.catalogProducts.filter(
            (p) => p.id !== id,
          );
          updateCatalogGrid();
          showToast("Deleted", "success");
        } catch (e) {
          showToast("Failed: " + e.message, "error");
        }
      };
      window.copyCatalogInfo = function (btn, pJson) {
        const p = JSON.parse(pJson);
        const pl = p.price
          ? `\n&#8364; Price: ${Number(p.price).toLocaleString()}`
          : "";
        const imgs =
          Array.isArray(p.images) && p.images.length
            ? p.images
            : p.imageURL
              ? [p.imageURL]
              : [];
        const il =
          imgs.length > 1 ? `\n&#128247; Images: ${imgs.length} photos` : "";
        navigator.clipboard
          .writeText(
            `*${p.productName}*\nID: ${p.productId}\nCategory: ${p.category}${pl.replace(/&#8364;/g, "EUR ")}${il.replace(/&#128247;/g, "")}\nSizes: ${(p.sizes || []).join(", ")}`,
          )
          .then(() => {
            btn.innerHTML = "&#x2705; Copied!";
            btn.classList.add("copied");
            setTimeout(() => {
              btn.innerHTML = "&#128203; Copy";
              btn.classList.remove("copied");
            }, 2000);
          });
      };

      // ── CATEGORIES ──
      function renderCategories() {
        document.getElementById("admin-content-area").innerHTML =
          `<div class="admin-table-card">
          <div class="admin-table-head"><h3>Categories (${ADMIN.categories.length})</h3><button class="btn btn-primary btn-sm" onclick="showAddCategoryModal()">+ Add Category</button></div>
          <div style="overflow-x:auto"><table class="data-table"><thead><tr><th>Name</th><th>Slug</th><th>Actions</th></tr></thead>
          <tbody>${ADMIN.categories.length ? ADMIN.categories.map((c) => `<tr><td><strong>${c.name}</strong></td><td><span style="font-size:0.8rem;background:var(--cream);padding:3px 8px;border-radius:3px">${c.slug}</span></td><td><button class="btn btn-sm" style="background:var(--danger);color:white;border:none;border-radius:4px" onclick="deleteCategory('${c.firebaseId}')">Delete</button></td></tr>`).join("") : '<tr><td colspan="3" style="text-align:center;color:var(--gray-400);padding:32px">No categories yet.</td></tr>'}</tbody>
          </table></div></div>`;
      }
      window.showAddCategoryModal = function () {
        showModal(
          `<div class="modal-header"><h3>Add Category</h3><button onclick="closeModal()" style="background:none;border:none;cursor:pointer;font-size:1.3rem;color:var(--gray-400)">&#x2715;</button></div><div class="modal-body"><div style="display:flex;flex-direction:column;gap:14px"><div class="form-group"><label>Category Name *</label><input type="text" id="cat-name" placeholder="e.g. Women" oninput="autoSlug()"></div><div class="form-group"><label>Slug</label><input type="text" id="cat-slug" style="background:var(--gray-100)"></div></div></div><div class="modal-footer"><button class="btn btn-outline" onclick="closeModal()">Cancel</button><button class="btn btn-gold" onclick="addCategory()">Save</button></div>`,
        );
      };
      window.autoSlug = function () {
        const n = document.getElementById("cat-name")?.value || "";
        document.getElementById("cat-slug").value = n
          .toLowerCase()
          .trim()
          .replace(/\s+/g, "-")
          .replace(/[^a-z0-9-]/g, "");
      };
      window.addCategory = async function () {
        const n = document.getElementById("cat-name")?.value.trim(),
          s = document.getElementById("cat-slug")?.value.trim();
        if (!n || !s) {
          showToast("Name and slug required", "error");
          return;
        }
        if (ADMIN.categories.find((c) => c.slug === s)) {
          showToast("Slug exists", "error");
          return;
        }
        try {
          const data = {
            name: n,
            slug: s,
            createdAt: new Date().toISOString(),
          };
          const r = await addDoc(collection(db, "categories"), data);
          ADMIN.categories.push({ ...data, firebaseId: r.id });
          closeModal();
          renderCategories();
          showToast("Added!", "success");
        } catch (e) {
          showToast("Failed: " + e.message, "error");
        }
      };
      window.deleteCategory = async function (fid) {
        if (!confirm("Delete?")) return;
        try {
          await deleteDoc(doc(db, "categories", fid));
          ADMIN.categories = ADMIN.categories.filter(
            (c) => c.firebaseId !== fid,
          );
          renderCategories();
          showToast("Deleted", "success");
        } catch (e) {
          showToast("Failed", "error");
        }
      };

      // ── COUPONS ──
      function renderCoupons() {
        document.getElementById("admin-content-area").innerHTML =
          `<div class="admin-table-card">
          <div class="admin-table-head"><h3>Discount Coupons</h3><button class="btn btn-primary btn-sm" onclick="showAddCouponModal()">+ Add Coupon</button></div>
          <table class="data-table"><thead><tr><th>Code</th><th>Type</th><th>Discount</th><th>Description</th><th>Active</th><th>Actions</th></tr></thead>
          <tbody>${ADMIN.coupons.length ? ADMIN.coupons.map((c) => `<tr><td><strong>${c.code || ""}</strong></td><td>${c.type || "percent"}</td><td>${c.type === "percent" ? c.discount + "%" : c.type === "flat" ? "EUR" + c.discount : "Free Shipping"}</td><td>${c.desc || "—"}</td><td>${c.active !== false ? '<span style="color:var(--success)">&#10003; Active</span>' : '<span style="color:var(--gray-400)">Inactive</span>'}</td><td><button class="btn btn-sm" style="background:var(--danger);color:white;border:none;border-radius:4px" onclick="deleteCoupon('${c.firebaseId}')">Delete</button></td></tr>`).join("") : '<tr><td colspan="6" style="text-align:center;color:var(--gray-400);padding:32px">No coupons</td></tr>'}</tbody>
          </table></div>`;
      }
      window.showAddCouponModal = function () {
        showModal(
          `<div class="modal-header"><h3>Add Coupon</h3><button onclick="closeModal()" style="background:none;border:none;cursor:pointer;font-size:1.3rem">&#x2715;</button></div><div class="modal-body"><div style="display:flex;flex-direction:column;gap:14px"><div class="form-group"><label>Code *</label><input type="text" id="c-code" placeholder="SUMMER30" style="text-transform:uppercase"></div><div class="form-group"><label>Type</label><select id="c-type"><option value="percent">Percentage (%)</option><option value="flat">Flat (EUR)</option><option value="shipping">Free Shipping</option></select></div><div class="form-group"><label>Value</label><input type="number" id="c-val" placeholder="20"></div><div class="form-group"><label>Description</label><input type="text" id="c-desc" placeholder="20% off"></div></div></div><div class="modal-footer"><button class="btn btn-outline" onclick="closeModal()">Cancel</button><button class="btn btn-gold" onclick="addCoupon()">Save</button></div>`,
        );
      };
      window.addCoupon = async function () {
        const code = document
            .getElementById("c-code")
            ?.value.trim()
            .toUpperCase(),
          type = document.getElementById("c-type")?.value,
          discount = parseFloat(document.getElementById("c-val")?.value) || 0,
          desc = document.getElementById("c-desc")?.value;
        if (!code) {
          showToast("Code required", "error");
          return;
        }
        try {
          const data = {
            code,
            type,
            discount,
            desc,
            active: true,
            createdAt: new Date().toISOString(),
          };
          const r = await addDoc(collection(db, "coupons"), data);
          ADMIN.coupons.unshift({ ...data, firebaseId: r.id });
          closeModal();
          renderCoupons();
          showToast("Added!", "success");
        } catch (e) {
          showToast("Failed", "error");
        }
      };
      window.deleteCoupon = async function (fid) {
        if (!confirm("Delete?")) return;
        try {
          await deleteDoc(doc(db, "coupons", fid));
          ADMIN.coupons = ADMIN.coupons.filter((c) => c.firebaseId !== fid);
          renderCoupons();
          showToast("Deleted", "success");
        } catch (e) {
          showToast("Failed", "error");
        }
      };

      // ── CUSTOMERS ──
      function renderCustomers() {
        const m = {};
        ADMIN.orders.forEach((o) => {
          if (!o.email) return;
          if (!m[o.email])
            m[o.email] = {
              name: o.customer,
              email: o.email,
              phone: o.phone || "—",
              orders: 0,
              total: 0,
            };
          m[o.email].orders++;
          m[o.email].total += o.total || 0;
        });
        const cs = Object.values(m).sort((a, b) => b.total - a.total);
        document.getElementById("admin-content-area").innerHTML =
          `<div class="admin-table-card"><div class="admin-table-head"><h3>Customers (${cs.length})</h3></div><div style="overflow-x:auto"><table class="data-table"><thead><tr><th>Name</th><th>Email</th><th>Phone</th><th>Orders</th><th>Total Spent</th></tr></thead><tbody>${cs.length ? cs.map((c) => `<tr><td><strong>${c.name || "—"}</strong></td><td style="font-size:0.85rem">${c.email}</td><td style="font-size:0.85rem">${c.phone}</td><td>${c.orders}</td><td><strong>&#8364;${c.total.toLocaleString()}</strong></td></tr>`).join("") : '<tr><td colspan="5" style="text-align:center;color:var(--gray-400);padding:32px">No customers</td></tr>'}</tbody></table></div></div>`;
      }

      // ── SHIPPING ──
      function renderShipping() {
        const s = ADMIN.shipping || {
          standard: { price: 80, days: "3-5 days" },
          express: { price: 150, days: "1-2 days" },
          freeThreshold: 2000,
        };
        document.getElementById("admin-content-area").innerHTML =
          `<div class="admin-table-card" style="max-width:680px"><div class="admin-table-head"><h3>Shipping Rates</h3></div><div style="padding:28px">
          <table class="shipping-table" style="margin-bottom:22px"><thead><tr><th>Method</th><th>Delivery Time</th><th>Price (EUR)</th></tr></thead><tbody>
            <tr><td>Standard</td><td><input type="text" id="sh-std-days" value="${s.standard?.days || "3-5 days"}" style="padding:6px;border:1.5px solid var(--gray-200);border-radius:4px;font-family:var(--font-body);font-size:0.85rem;outline:none;width:100%"></td><td><input type="number" id="sh-std-price" value="${s.standard?.price || 80}" style="padding:6px;border:1.5px solid var(--gray-200);border-radius:4px;font-family:var(--font-body);font-size:0.85rem;outline:none;width:100%"></td></tr>
            <tr><td>Express</td><td><input type="text" id="sh-exp-days" value="${s.express?.days || "1-2 days"}" style="padding:6px;border:1.5px solid var(--gray-200);border-radius:4px;font-family:var(--font-body);font-size:0.85rem;outline:none;width:100%"></td><td><input type="number" id="sh-exp-price" value="${s.express?.price || 150}" style="padding:6px;border:1.5px solid var(--gray-200);border-radius:4px;font-family:var(--font-body);font-size:0.85rem;outline:none;width:100%"></td></tr>
          </tbody></table>
          <div class="form-group" style="margin-bottom:22px;max-width:280px"><label>Free Shipping Threshold (EUR)</label><input type="number" id="sh-free" value="${s.freeThreshold || 2000}"></div>
          <button class="btn btn-gold" onclick="saveShipping()">Save Shipping Rates</button>
        </div></div>`;
      }
      window.saveShipping = async function () {
        const data = {
          standard: {
            name: "Standard",
            days: document.getElementById("sh-std-days")?.value || "3-5 days",
            price: parseFloat(
              document.getElementById("sh-std-price")?.value || 80,
            ),
          },
          express: {
            name: "Express",
            days: document.getElementById("sh-exp-days")?.value || "1-2 days",
            price: parseFloat(
              document.getElementById("sh-exp-price")?.value || 150,
            ),
          },
          freeThreshold: parseFloat(
            document.getElementById("sh-free")?.value || 2000,
          ),
          id: "shipping",
          updatedAt: new Date().toISOString(),
        };
        try {
          if (ADMIN.shippingDocId)
            await updateDoc(doc(db, "settings", ADMIN.shippingDocId), data);
          else {
            const r = await addDoc(collection(db, "settings"), data);
            ADMIN.shippingDocId = r.id;
          }
          ADMIN.shipping = data;
          showToast("Saved!", "success");
        } catch (e) {
          showToast("Save failed: " + e.message, "error");
        }
      };

      // ── MODAL / TOAST ──
      window.showModal = function (html) {
        document.getElementById("modal-content").innerHTML = html;
        document.getElementById("modal-overlay").classList.add("show");
      };
      window.closeModal = function () {
        document.getElementById("modal-overlay").classList.remove("show");
      };
      window.showToast = function (msg, type = "info") {
        const c = document.querySelector(".toast-container");
        if (!c) return;
        const t = document.createElement("div");
        t.className = `toast ${type}`;
        t.innerHTML = `<span style="font-weight:700">${{ success: "&#10003;", error: "&#x2715;", info: "&#x2139;" }[type] || "&bull;"}</span> ${msg}`;
        c.appendChild(t);
        setTimeout(() => t.classList.add("show"), 10);
        setTimeout(() => {
          t.classList.remove("show");
          setTimeout(() => t.remove(), 400);
        }, 3500);
      };
      document.addEventListener("keydown", (e) => {
        if (e.key === "Escape") closeModal();
      });
    </script>
  </body>
</html>
